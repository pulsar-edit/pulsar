name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      build:
        description: Also build distributable binaries
        type: boolean
        default: false
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Print one line per spec instead of dots; CI logs stay readable and a hang
  # points at the exact spec.
  ATOM_JASMINE_REPORTER: list

# The full matrix is expensive (~20-45 minutes per platform), so CI is opt-in
# for ordinary pushes via head commit message markers:
#   [ci]    run the test jobs
#   [cd]    build distributable binaries
#   [ci/cd] both
# `contains()` is substring-based and `[ci/cd]` contains neither `[ci]` nor
# `[cd]`, so every condition names it explicitly. Pull requests, manual
# dispatch (`gh workflow run ci.yml`), and reusable calls always run the tests;
# dispatch builds binaries when its `build` input is set.

jobs:
  lint:
    # Advisory only: the repository carries pre-existing eslint and formatting
    # debt, so these steps report their findings without failing the run. Once
    # the debt is cleared, drop the `continue-on-error` flags to make it gate.
    name: Lint and format (advisory)
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[ci]') || contains(github.event.head_commit.message, '[ci/cd]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      # Linting needs the dev dependencies but no native builds, so skip install
      # scripts (Electron download, node-gyp, patch-package) for a fast job.
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts
      - name: Lint
        run: yarn lint
        continue-on-error: true
      - name: Check formatting
        run: yarn format:check
        continue-on-error: true

  test:
    name: Test on ${{ matrix.os }}
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[ci]') || contains(github.event.head_commit.message, '[ci/cd]')
    runs-on: ${{ matrix.os }}
    # Native rebuild plus the full editor and package suites are slow, and the
    # spec steps may retry once after an intermittent renderer crash.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        # The editor requires Node >= 24.18 (see .nvmrc / package.json engines),
        # so unlike the standalone packages there is no Node 20 entry.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Enable Git symlinks on Windows
        if: runner.os == 'Windows'
        run: git config --global core.symlinks true
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - name: Install Linux build and headless-display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-dev libxkbfile-dev libsecret-1-dev
      # `postinstall` (patch-package) and several native install scripts fail or
      # are wasted here: node-pty's Windows build is broken until patched, and
      # the native modules are rebuilt for Electron below regardless. Install
      # without scripts, then reproduce the pieces we actually need.
      #
      # Preparing the many git-hosted `@lumine-code` forks is flaky on Windows
      # (yarn classic intermittently fails packing a git dependency with
      # `ENOENT ... .yarn-tarball.tgz`). Serialize the work and retry a couple
      # of times to absorb it.
      - name: Install dependencies
        shell: bash
        run: |
          install() { yarn install --frozen-lockfile --ignore-scripts --network-concurrency 1; }
          install || install || install
      - name: Apply patches
        run: npx patch-package
      - name: Download the Electron binary
        run: node ./node_modules/electron/install.js
      - name: Rebuild native modules for Electron
        run: yarn build
      - name: Run editor specs
        shell: bash
        timeout-minutes: 100
        run: |
          prefix=""
          if [ "$RUNNER_OS" = "Linux" ]; then prefix="xvfb-run --auto-servernum"; fi
          # macOS runners have no GNU `timeout`; Homebrew coreutils ships it
          # as `gtimeout`. Without either, the step timeout is the backstop.
          if command -v timeout >/dev/null 2>&1; then
            guard="timeout 2700"
          elif command -v gtimeout >/dev/null 2>&1; then
            guard="gtimeout 2700"
          else
            guard=""
          fi
          # Guard each attempt (a wedged Electron session never exits on its
          # own) and retry once: Windows runners intermittently crash or hang
          # the renderer for reasons unrelated to the specs (the suite passes
          # when that does not strike).
          if ! $guard $prefix yarn test:editor; then
            echo "Retrying editor specs after failure..."
            $guard $prefix yarn test:editor
          fi
      # Run each bundled package in its own Electron session. The combined
      # `yarn test:pkgs` session suffers cross-package state leakage (~200
      # spurious failures) and has hung CI runners; per-package isolation
      # matches how the packages are developed and verified. The `timeout`
      # guard turns any hung package into a fast failure with logs intact.
      - name: Run bundled package specs
        shell: bash
        timeout-minutes: 90
        run: |
          prefix=""
          if [ "$RUNNER_OS" = "Linux" ]; then prefix="xvfb-run --auto-servernum"; fi
          # macOS runners have no GNU `timeout`; Homebrew coreutils ships it
          # as `gtimeout`. Without either, the step timeout is the backstop.
          if command -v timeout >/dev/null 2>&1; then
            guard="timeout 600"
          elif command -v gtimeout >/dev/null 2>&1; then
            guard="gtimeout 600"
          else
            guard=""
          fi
          status=0
          failed=""
          for d in packages/*/spec; do
            pkg="${d#packages/}"
            pkg="${pkg%/spec}"
            echo "::group::$pkg"
            # Retry once: Windows runners intermittently crash the renderer
            # with an access violation unrelated to the package under test.
            if ! $guard $prefix yarn start --test "$d"; then
              echo "Retrying $pkg after failure..."
              if ! $guard $prefix yarn start --test "$d"; then
                echo "::error::Package specs failed: $pkg"
                failed="$failed $pkg"
                status=1
              fi
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then echo "Failed packages:$failed"; fi
          exit $status

  build:
    name: Build on ${{ matrix.os }}
    if: >-
      (github.event_name == 'push' &&
        (contains(github.event.head_commit.message, '[cd]') ||
         contains(github.event.head_commit.message, '[ci/cd]'))) ||
      (github.event_name == 'workflow_dispatch' && inputs.build)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      # No signing identities are configured on CI; build unsigned binaries.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev
      # Same install sequence as the test job; see the comments there.
      - name: Install dependencies
        shell: bash
        run: |
          install() { yarn install --frozen-lockfile --ignore-scripts --network-concurrency 1; }
          install || install || install
      - name: Apply patches
        run: npx patch-package
      - name: Download the Electron binary
        run: node ./node_modules/electron/install.js
      - name: Rebuild native modules for Electron
        run: yarn build
      - name: Build distributable binaries
        run: yarn dist
      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: lumine-${{ matrix.os }}
          path: binaries/
          retention-days: 14
