name: CI

on:
  push:
    # Docs-only pushes don't need CI. For anything else, use [skip ci] in the
    # head commit message to bypass a run.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Print one line per spec instead of dots; CI logs stay readable and a hang
  # points at the exact spec.
  ATOM_JASMINE_REPORTER: list

# Tests run by default (no commit marker needed). The fast lint/format lane
# runs on every push and pull request; the expensive 3-OS matrix runs on pushes
# to `master`, on pull requests, on manual dispatch, and on reusable calls.
# Skip a run with `[skip ci]` in the head commit message, or push docs-only
# changes (see paths-ignore above). Distributable binaries are cut by
# `release.yml` on a `vX.Y.Z` tag, not here.

jobs:
  lint:
    # Advisory only: the repository carries pre-existing eslint and formatting
    # debt, so these steps report their findings without failing the run. Once
    # the debt is cleared, drop the `continue-on-error` flags to make it gate.
    name: Lint and format (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      # Linting needs the dev dependencies but no native builds, so skip install
      # scripts (Electron download, node-gyp, patch-package) for a fast job.
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts
      - name: Lint
        run: yarn lint
        continue-on-error: true
      - name: Check formatting
        run: yarn format:check
        continue-on-error: true

  test:
    name: Test on ${{ matrix.os }}
    # The fast lane (lint) runs everywhere; the full matrix is reserved for
    # pushes to master, pull requests, manual dispatch, and reusable calls.
    if: github.event_name != 'push' || github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.os }}
    # Native rebuild plus the full editor and package suites are slow, and the
    # spec steps may retry once after an intermittent renderer crash.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        # The editor requires Node >= 24.18 (see .nvmrc / package.json engines),
        # so unlike the standalone packages there is no Node 20 entry.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Enable Git symlinks on Windows
        if: runner.os == 'Windows'
        run: git config --global core.symlinks true
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - name: Install Linux build and headless-display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-dev libxkbfile-dev libsecret-1-dev
      # `postinstall` (patch-package) and several native install scripts fail or
      # are wasted here: node-pty's Windows build is broken until patched, and
      # the native modules are rebuilt for Electron below regardless. Install
      # without scripts, then reproduce the pieces we actually need.
      #
      # Preparing the many git-hosted `@lumine-code` forks is flaky on Windows
      # (yarn classic intermittently fails packing a git dependency with
      # `ENOENT ... .yarn-tarball.tgz`). Serialize the work and retry a couple
      # of times to absorb it.
      - name: Install dependencies
        shell: bash
        run: |
          install() { yarn install --frozen-lockfile --ignore-scripts --network-concurrency 1; }
          install || install || install
      - name: Apply patches
        run: npx patch-package
      - name: Install bundled Git
        run: node script/ensure-dugite.js
      - name: Download the Electron binary
        run: node ./node_modules/electron/install.js
      - name: Rebuild native modules for Electron
        run: yarn build
      # A single full-suite Electron session, capped so a wedged session cannot
      # hang the job. No retries and no per-file fallback: a failure here is a
      # real regression or a flaky spec, and flaky specs get fixed rather than
      # absorbed into a 30-minute isolation pass.
      - name: Run editor specs
        shell: bash
        timeout-minutes: 60
        run: |
          prefix=""
          if [ "$RUNNER_OS" = "Linux" ]; then prefix="xvfb-run --auto-servernum"; fi
          # macOS runners have no GNU `timeout`; Homebrew coreutils ships it as
          # `gtimeout`. Without either, the step timeout is the backstop.
          if command -v timeout >/dev/null 2>&1; then guard="timeout 2700"
          elif command -v gtimeout >/dev/null 2>&1; then guard="gtimeout 2700"
          else guard=""; fi
          $guard $prefix yarn test:editor
      # Run each bundled package in its own Electron session. The combined
      # `yarn test:pkgs` session suffers cross-package state leakage (~200
      # spurious failures) and has hung CI runners; per-package isolation
      # matches how the packages are developed and verified. The `timeout`
      # guard turns any hung package into a fast failure with logs intact.
      - name: Run bundled package specs
        shell: bash
        timeout-minutes: 90
        run: |
          prefix=""
          if [ "$RUNNER_OS" = "Linux" ]; then prefix="xvfb-run --auto-servernum"; fi
          # macOS runners have no GNU `timeout`; Homebrew coreutils ships it
          # as `gtimeout`. Without either, the step timeout is the backstop.
          if command -v timeout >/dev/null 2>&1; then
            guard="timeout 600"
          elif command -v gtimeout >/dev/null 2>&1; then
            guard="gtimeout 600"
          else
            guard=""
          fi
          status=0
          failed=""
          for d in packages/*/spec; do
            pkg="${d#packages/}"
            pkg="${pkg%/spec}"
            echo "::group::$pkg"
            # Retry once: Windows runners intermittently crash the renderer
            # with an access violation unrelated to the package under test.
            if ! $guard $prefix yarn start --test "$d"; then
              echo "Retrying $pkg after failure..."
              if ! $guard $prefix yarn start --test "$d"; then
                echo "::error::Package specs failed: $pkg"
                failed="$failed $pkg"
                status=1
              fi
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then echo "Failed packages:$failed"; fi
          exit $status
      # The crash reporter (enabled by default on Windows/Linux, see
      # src/main-process/start.js) writes renderer minidumps to
      # ~/.lumine/crashdumps even when a later attempt turns the job green.
      # Surface them so native crashes can be analyzed offline.
      - name: Stage crash dumps
        if: always()
        shell: bash
        run: |
          dumpdir="$HOME/.lumine/crashdumps"
          if [ -d "$dumpdir" ] && find "$dumpdir" -name '*.dmp' | grep -q .; then
            mkdir -p crashdumps-artifact
            cp -r "$dumpdir"/. crashdumps-artifact/
            echo "Found crash dumps:"
            find crashdumps-artifact -name '*.dmp'
          else
            echo "No crash dumps found."
          fi
      - name: Upload crash dumps
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: crashdumps-${{ matrix.os }}
          path: crashdumps-artifact/
          if-no-files-found: ignore
          retention-days: 7
